[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python3",
  "pkg-config",
  "cairo",
  "pango",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "glib",
  "fontconfig",
]

[phases.build]
cmds = [
  "npm install --omit=dev",
  "PKG_CONFIG_PATH=$(find /nix/store -maxdepth 5 -name '*.pc' 2>/dev/null | xargs -I{} dirname {} | sort -u | tr '\n' ':' | sed 's/:$//') npm rebuild canvas --build-from-source"
]

[start]
cmd = "node start.js"
