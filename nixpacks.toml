[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python3",
  "pkg-config",
  "cairo",
  "pango",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "glib",
  "fontconfig",
]

[phases.build]
cmds = [
  "npm install --omit=dev",
  "PKG_CONFIG_PATH=$(find /nix/store -maxdepth 4 -name 'pixman-1.pc' 2>/dev/null | head -1 | xargs dirname) npm rebuild canvas --build-from-source"
]

[start]
cmd = "node start.js"
