[build]
builder = "nixpacks"

[deploy]
startCommand = "node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

# ── Persistent Volume ──────────────────────────────────────────────────────────
# Mount a Railway Volume at /app/data so SQLite survives redeploys.
# In the Railway dashboard: add a Volume, set mount path to /app/data
# Without this, data/sigil.db is wiped on every deploy.
