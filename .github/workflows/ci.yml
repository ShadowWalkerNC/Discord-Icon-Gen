name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Syntax · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Syntax check (src/ and gui/)
        run: |
          echo "Checking syntax for all JS files in src/ and gui/..."
          find src gui -name "*.js" | while read file; do
            node --check "$file" && echo "  OK: $file" || { echo "  FAIL: $file"; exit 1; }
          done
          echo "All files passed syntax check."

      - name: Lint (ESLint)
        run: npm run lint

      # audit-level=critical: two unfixable high-severity transitive deps are
      # intentionally excluded from blocking CI:
      #   - tar via @mapbox/node-pre-gyp (canvas) - no lockfile in repo
      #   - undici via discord.js v14 - fix requires breaking djs v13 downgrade
      # Revisit when discord.js ships a patched undici bump.
      - name: Dependency security audit
        run: npm audit --audit-level=critical
